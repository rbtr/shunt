apiVersion: apps/v1
kind: Deployment
metadata:
  name: shunt
  labels:
    app.kubernetes.io/name: shunt
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: shunt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shunt
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: shunt
          image: ghcr.io/rbtr/shunt:latest
          env:
            - name: SHUNT_INSTANCE
              value: "https://forge.example.com"
            - name: SHUNT_TOPIC
              value: "merge-queue"
            - name: HOME
              value: "/tmp"
            - name: SHUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: shunt-bot
                  key: token
          ports:
            - containerPort: 8080
              name: health
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
